# =============================================================================
# NEXUS CHAT - Nginx Configuration
# =============================================================================
# Production Nginx configuration for React SPA with optional API proxying
# 
# Features:
# - SPA routing (all routes serve index.html)
# - Gzip compression for smaller payloads
# - Cache headers for static assets
# - Optional API proxy to backend
# - Security headers
# =============================================================================

server {
    # Listen on port 80
    listen 80;
    listen [::]:80;
    
    # Server name (replace with your domain in production)
    server_name localhost;
    
    # =============================================================================
    # ROOT AND INDEX
    # =============================================================================
    # Serve static files from /usr/share/nginx/html
    root /usr/share/nginx/html;
    index index.html;
    
    # =============================================================================
    # SPA ROUTING
    # =============================================================================
    # For Single Page Applications, serve index.html for all routes
    # This allows client-side routing to work
    location / {
        try_files $uri $uri/ /index.html;
        
        # Cache index.html briefly (it's small and changes with app updates)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    # =============================================================================
    # STATIC ASSETS CACHING
    # =============================================================================
    # Cache static assets (JS, CSS, images, fonts)
    # These have content-hash in filename for long-term caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
        # Enable gzip compression
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
        
        # Cache for 1 year (assets have content hashes)
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # Access log (disable for performance in high-traffic)
        access_log off;
    }
    
    # =============================================================================
    # API PROXY (Optional)
    # =============================================================================
    # Uncomment this block to proxy API requests to backend
    # Requires API_BACKEND_URL environment variable at runtime
    #
    # location /api/ {
    #     # Backend URL (set via environment variable or hardcode for production)
    #     # Example: http://backend:8080 for Docker, https://api.example.com for production
    #     set $backend_url "${API_BACKEND_URL}";
    #     
    #     proxy_pass $backend_url;
    #     proxy_http_version 1.1;
    #     
    #     # Proxy headers
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     
    #     # Timeouts
    #     proxy_connect_timeout 60s;
    #     proxy_send_timeout 60s;
    #     proxy_read_timeout 60s;
    #     
    #     # Disable buffering for streaming
    #     proxy_buffering off;
    # }
    #
    # WebSocket proxy (if using WebSocket for real-time chat)
    #
    # location /ws/ {
    #     proxy_pass http://backend:8080/ws;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_read_timeout 86400;
    # }
    
    # =============================================================================
    # SECURITY HEADERS
    # =============================================================================
    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Prevent XSS attacks
    add_header X-Content-Type-Options "nosniff" always;
    
    # XSS protection (legacy but still useful)
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Content Security Policy (adjust for your needs)
    # This is restrictive - you may need to adjust for your CDN, fonts, etc.
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' ws: wss:;" always;
    
    # =============================================================================
    # GZIP COMPRESSION
    # =============================================================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    gzip_disable "MSIE [1-6]\.";
    
    # =============================================================================
    # PERFORMANCE
    # =============================================================================
    # Disable access log for health checks
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
    
    # =============================================================================
    # ERROR PAGES
    # =============================================================================
    # Custom error pages (optional)
    # error_page 404 /index.html;
    
    # =============================================================================
    # HTTPS CONFIGURATION (for production)
    # =============================================================================
    # For HTTPS, create a separate server block or use certbot
    # Example for HTTPS:
    #
    # server {
    #     listen 443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     
    #     server_name your-domain.com;
    #     
    #     # SSL certificates (use certbot or provide your own)
    #     ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    #     
    #     # SSL configuration
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #     
    #     # Include the rest of the configuration from above...
    # }
    #
    # Redirect HTTP to HTTPS (uncomment for production)
    # server {
    #     listen 80;
    #     listen [::]:80;
    #     server_name your-domain.com;
    #     return 301 https://$server_name$request_uri;
    # }
}