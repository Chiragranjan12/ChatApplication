# =============================================================================
# NEXUS CHAT - SPRING BOOT BASE CONFIGURATION
# =============================================================================
# This is the BASE configuration file that uses environment variables with
# fallbacks. Use this as the foundation for all environments.
# 
# Environment variables are read using: ${VAR_NAME:fallback_value}
# - If VAR_NAME is set, it uses that value
# - If VAR_NAME is not set, it uses the fallback_value
# - If no fallback is provided, the application will fail if the variable
#   is not set (good for required secrets)
# =============================================================================


# =============================================================================
# SECTION 1: APPLICATION BASICS
# =============================================================================
# Application name (used in logs, actuator info, etc.)
spring.application.name=nexuschat-server

# Active Spring profile (dev, prod, test)
# Override with: --spring.profiles.active=dev
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Context path for all endpoints (e.g., /api/users instead of /users)
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH:/api}


# =============================================================================
# SECTION 2: DATABASE CONFIGURATION (PostgreSQL)
# =============================================================================
# Database URL - uses PostgreSQL by default
# Override with: DATABASE_URL=jdbc:postgresql://host:port/database
# Example: jdbc:postgresql://localhost:5432/chatdb
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/chatdb}

# Database username
# Override with: DB_USERNAME=your_username
spring.datasource.username=${DB_USERNAME:postgres}

# Database password - REQUIRED in production
# Override with: DB_PASSWORD=your_password
# No fallback - must be set via environment variable in production
spring.datasource.password=${DB_PASSWORD:postgres}

# JDBC Driver class for PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================================================
# SECTION 3: HIKARICP CONNECTION POOL CONFIGURATION
# =============================================================================
# Maximum number of connections in the pool
# Recommended: 20-50 for production, 5-10 for development
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:20}

# Minimum number of idle connections
# Recommended: 5-10 for production, 2-5 for development
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}

# Connection timeout in milliseconds (30 seconds)
# Maximum time to wait for a connection from the pool
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT:30000}

# Idle timeout in milliseconds (10 minutes)
# Maximum time a connection can be idle before being removed
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT:600000}

# Maximum lifetime of a connection in milliseconds (30 minutes)
# Connections older than this will be removed
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME:1800000}

# Connection pool name (for logging/monitoring)
spring.datasource.hikari.pool-name=NexusChatHikariPool


# =============================================================================
# SECTION 4: JPA/HIBERNATE CONFIGURATION
# =============================================================================
# Hibernate DDL auto mode
# Options: none, validate, update, create, create-drop
# - none: Do nothing (manual migrations required)
# - validate: Validate schema (recommended for production)
# - update: Update schema (development only)
# - create: Create schema (drops existing - development only)
# - create-drop: Create and drop (testing only)
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}

# Show SQL statements in logs (disable in production!)
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# Disable open-in-view (prevents lazy loading issues)
spring.jpa.open-in-view=false

# Hibernate SQL formatting (for debugging)
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}

# Hibernate SQL comments (for debugging)
spring.jpa.properties.hibernate.use_sql_comments=${JPA_USE_SQL_COMMENTS:true}

# JDBC batch size for bulk operations
spring.jpa.properties.hibernate.jdbc.batch_size=20

# Order inserts for better batch performance
spring.jpa.properties.hibernate.order_inserts=true

# Order updates for better batch performance
spring.jpa.properties.hibernate.order_updates=true

# PostgreSQL dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Physical naming strategy
spring.jpa.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Implicit naming strategy
spring.jpa.naming.implicit-strategy=org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy


# =============================================================================
# SECTION 5: EMAIL/SMTP CONFIGURATION (Gmail)
# =============================================================================
# SMTP host
# Gmail: smtp.gmail.com
# Outlook: smtp-mail.outlook.com
# Yahoo: smtp.mail.yahoo.com
spring.mail.host=${MAIL_HOST:smtp.gmail.com}

# SMTP port
# 587 for TLS/STARTTLS
# 465 for SSL
spring.mail.port=${MAIL_PORT:587}

# Email username - REQUIRED
# Use your full Gmail address: your-email@gmail.com
spring.mail.username=${MAIL_USERNAME}

# Email password - REQUIRED
# For Gmail: Use App Password (16 characters), NOT your regular password
# Generate at: https://myaccount.google.com/apppasswords
spring.mail.password=${MAIL_PASSWORD}

# SMTP authentication
spring.mail.properties.mail.smtp.auth=true

# Enable STARTTLS (required for Gmail)
spring.mail.properties.mail.smtp.starttls.enable=true

# Require STARTTLS
spring.mail.properties.mail.smtp.starttls.required=true

# Connection timeout (5 seconds)
spring.mail.properties.mail.smtp.connectiontimeout=5000

# Timeout (5 seconds)
spring.mail.properties.mail.smtp.timeout=5000

# Write timeout (5 seconds)
spring.mail.properties.mail.smtp.writetimeout=5000


# =============================================================================
# SECTION 6: JWT AUTHENTICATION CONFIGURATION
# =============================================================================
# JWT secret key - REQUIRED
# Generate using: openssl rand -base64 32
# Minimum 32 characters required
# WARNING: Never use default in production!
jwt.secret=${JWT_SECRET}

# JWT token expiration time in milliseconds
# Default: 3600000 (15 minutes)
# Examples:
#   900000 = 15 minutes
#   1800000 = 30 minutes
#   3600000 = 1 hour
jwt.expiration=${JWT_EXPIRATION:3600000}

# Refresh token expiration time in milliseconds
# Default: 86400000 (7 days)
# Examples:
#   86400000 = 7 days
#   259200000 = 3 days
#   604800000 = 7 days
jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:86400000}


# =============================================================================
# SECTION 7: GOOGLE OAUTH2 CONFIGURATION
# =============================================================================
# OAuth2 Client ID - REQUIRED for Google login
# Get from: https://console.cloud.google.com/apis/credentials
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}

# OAuth2 Client Secret - REQUIRED for Google login
# Get from: https://console.cloud.google.com/apis/credentials
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# OAuth2 scopes
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# OAuth2 redirect URI
# Must match Google Cloud Console configuration
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/oauth2/callback/google}

# Google OAuth2 provider URIs
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub


# =============================================================================
# SECTION 8: SERVER CONFIGURATION
# =============================================================================
# Server port
# Override with: SERVER_PORT=8080
server.port=${SERVER_PORT:8080}

# Enable HTTP/2
server.http2.enabled=true

# Error handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=true

# Compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css


# =============================================================================
# SECTION 9: JACKSON JSON CONFIGURATION
# =============================================================================
# Include only non-null properties
spring.jackson.default-property-inclusion=non_null

# Don't write dates as timestamps
spring.jackson.serialization.write-dates-as-timestamps=false

# Pretty print JSON (disable in production)
spring.jackson.serialization.indent-output=${JACKSON_INDENT_OUTPUT:false}

# Fail on unknown properties
spring.jackson.deserialization.fail-on-unknown-properties=false

# Time zone
spring.jackson.time-zone=UTC

# Date format
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSS'Z'


# =============================================================================
# SECTION 10: FILE UPLOAD CONFIGURATION
# =============================================================================
# Enable file uploads
spring.servlet.multipart.enabled=true

# Maximum file size (10MB)
spring.servlet.multipart.max-file-size=10MB

# Maximum request size (10MB)
spring.servlet.multipart.max-request-size=10MB


# =============================================================================
# SECTION 11: CACHE CONFIGURATION
# =============================================================================
# Cache type (simple, caffeine, redis)
spring.cache.type=${CACHE_TYPE:simple}

# Cache names
spring.cache.cache-names=users,rooms,messages

# Caffeine cache specification
# Format: maximumSize=500,expireAfterWrite=5m
spring.cache.caffeine.spec=${CACHE_CAFFEINE_SPEC:maximumSize=500,expireAfterWrite=5m}


# =============================================================================
# SECTION 12: LOGGING CONFIGURATION
# =============================================================================
# Root log level (DEBUG, INFO, WARN, ERROR)
logging.level.root=${LOG_LEVEL:INFO}

# Application package log level
logging.level.com.chirag.nexuschat=${LOG_LEVEL_APP:DEBUG}

# Spring framework log levels
logging.level.org.springframework=${LOG_LEVEL_SPRING:INFO}
logging.level.org.springframework.web=${LOG_LEVEL_SPRING_WEB:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SPRING_SECURITY:INFO}
logging.level.org.springframework.web.socket=${LOG_LEVEL_SPRING_WEBSOCKET:INFO}

# Hibernate log levels
logging.level.org.hibernate=${LOG_LEVEL_HIBERNATE:INFO}
logging.level.org.hibernate.SQL=${LOG_LEVEL_HIBERNATE_SQL:INFO}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOG_LEVEL_HIBERNATE_BINDER:INFO}

# Console log pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# File log pattern
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Log file path
logging.file.name=${LOG_FILE:logs/application.log}

# Log file max size (10MB)
logging.file.max-size=10MB

# Log file max history (days)
logging.file.max-history=10


# =============================================================================
# SECTION 13: ACTUATOR/MONITORING CONFIGURATION
# =============================================================================
# Expose actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics

# Actuator base path
management.endpoints.web.base-path=/actuator

# Health endpoint details
management.endpoint.health.show-details=when-authorized

# Prometheus metrics export
management.metrics.export.prometheus.enabled=${METRICS_PROMETHEUS_ENABLED:false}


# =============================================================================
# SECTION 14: WEBSOCKET CONFIGURATION (STOMP)
# =============================================================================
# WebSocket message size limit (default 64KB - increase for file uploads)
spring.websocket.message-size-limit=65536

# WebSocket ping interval (keep connection alive)
spring.websocket.ws.heartbeat-timeout=30000


# =============================================================================
# SECTION 15: CORS CONFIGURATION
# =============================================================================
# Allowed origins (comma-separated)
# Use environment variable for flexibility
spring.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Allowed methods
spring.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS

# Allowed headers
spring.cors.allowed-headers=*

# Allow credentials
spring.cors.allow-credentials=true

# Max age (preflight cache)
spring.cors.max-age=3600
