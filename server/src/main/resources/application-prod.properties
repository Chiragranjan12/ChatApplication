# =============================================================================
# NEXUS CHAT - PRODUCTION ENVIRONMENT CONFIGURATION
# =============================================================================
# This file is loaded when: spring.profiles.active=prod
# Or when deployed to Railway, Render, or any production server
#
# Production settings include:
# - PostgreSQL database (required)
# - Schema validation only (no auto-changes)
# - Minimal logging
# - Security hardening
# - Performance optimizations
# =============================================================================


# =============================================================================
# SECTION 1: DATABASE - POSTGRESQL (REQUIRED)
# =============================================================================
# PostgreSQL is REQUIRED in production
# Set these environment variables in your deployment platform:
# - DATABASE_URL (full JDBC URL)
# - DB_USERNAME
# - DB_PASSWORD
#
# Example DATABASE_URL format:
# jdbc:postgresql://host:port/database?sslmode=require
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


# =============================================================================
# SECTION 2: JPA/HIBERNATE - SAFE MODE
# =============================================================================
# ⚠️ CRITICAL: Use 'validate' in production!
# This ensures your entities match the database schema
# Use migrations (Flyway/Liquibase) for schema changes
spring.jpa.hibernate.ddl-auto=validate

# Disable SQL logging in production (performance)
spring.jpa.show-sql=false

# Disable SQL formatting in production
spring.jpa.properties.hibernate.format_sql=false

# Disable SQL comments in production
spring.jpa.properties.hibernate.use_sql_comments=false


# =============================================================================
# SECTION 3: H2 CONSOLE - DISABLED
# =============================================================================
# Disable H2 console in production (security)
spring.h2.console.enabled=false


# =============================================================================
# SECTION 4: LOGGING - MINIMAL FOR PERFORMANCE
# =============================================================================
# Root level: WARN to reduce log volume
logging.level.root=WARN

# Application package: INFO for essential logs
logging.level.com.chirag.nexuschat=INFO

# Spring framework: WARN to reduce noise
logging.level.org.springframework=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN

# Hibernate: WARN (only errors and warnings)
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=WARN

# Disable detailed SQL logging in production
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF


# =============================================================================
# SECTION 5: JACKSON - PERFORMANCE MODE
# =============================================================================
# Disable pretty print in production (smaller payloads)
spring.jackson.serialization.indent-output=false


# =============================================================================
# SECTION 6: SERVER - PRODUCTION SETTINGS
# =============================================================================
# Hide error details in production (security)
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false


# =============================================================================
# SECTION 7: CORS - STRICT ORIGIN CHECKING
# =============================================================================
# ⚠️ IMPORTANT: Set your production domain!
# Example: https://your-domain.com
# Multiple origins: https://example.com,https://www.example.com
spring.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Or restrict to specific domains:
# spring.cors.allowed-origins=https://nexus-chat.example.com


# =============================================================================
# SECTION 8: CACHE - ENABLED FOR PERFORMANCE
# =============================================================================
# Enable caching in production
spring.cache.type=caffeine

# Larger cache for production
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=10m


# =============================================================================
# SECTION 9: ACTUATOR - SECURED ENDPOINTS
# =============================================================================
# Expose only health endpoint in production
management.endpoints.web.exposure.include=health

# Don't show detailed health info (security)
management.endpoint.health.show-details=never


# =============================================================================
# SECTION 10: SECURITY HARDENING
# =============================================================================
# Disable frame options (if using H2 console - should be disabled anyway)
# spring.security.headers.frame-options=false

# Session management
# spring.session.store-type=redis (if using Redis)

# HTTPS enforcement (configure at load balancer/reverse proxy)
# server.ssl.enabled=true (if using embedded Tomcat with SSL)


# =============================================================================
# SECTION 11: PERFORMANCE OPTIMIZATIONS
# =============================================================================
# Connection pool - larger for production
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10

# JDBC batch size - larger for bulk operations
spring.jpa.properties.hibernate.jdbc.batch_size=50


# =============================================================================
# SECTION 12: FILE UPLOAD - PRODUCTION LIMITS
# =============================================================================
# Maximum file size (10MB)
spring.servlet.multipart.max-file-size=10MB

# Maximum request size (10MB)
spring.servlet.multipart.max-request-size=10MB


# =============================================================================
# SECTION 13: WEBSOCKET - PRODUCTION SETTINGS
# =============================================================================
# WebSocket message size limit
spring.websocket.message-size-limit=65536

# Connection heartbeat
spring.websocket.ws.heartbeat-timeout=60000


# =============================================================================
# SECTION 14: METRICS & MONITORING
# =============================================================================
# Enable Prometheus metrics if using Prometheus
management.metrics.export.prometheus.enabled=${METRICS_PROMETHEUS_ENABLED:false}


# =============================================================================
# PRODUCTION DEPLOYMENT CHECKLIST
# =============================================================================
# Before deploying to production, ensure:
#
# ✅ 1. DATABASE
#    - Set DATABASE_URL environment variable
#    - Set DB_USERNAME environment variable
#    - Set DB_PASSWORD environment variable (use secrets manager!)
#    - Database schema is up to date (run migrations)
#
# ✅ 2. JWT SECRET
#    - Generate a strong secret: openssl rand -base64 32
#    - Set JWT_SECRET environment variable
#    - NEVER use default/placeholder values
#
# ✅ 3. GOOGLE OAUTH2
#    - Set GOOGLE_CLIENT_ID environment variable
#    - Set GOOGLE_CLIENT_SECRET environment variable
#    - Configure redirect URI in Google Cloud Console
#    - Add your production domain to authorized origins
#
# ✅ 4. EMAIL
#    - Set MAIL_USERNAME environment variable
#    - Set MAIL_PASSWORD environment variable (use App Password!)
#    - Test email sending before going live
#
# ✅ 5. CORS
#    - Set CORS_ALLOWED_ORIGINS to your production domain
#    - Remove localhost origins
#
# ✅ 6. SSL/HTTPS
#    - Configure SSL at load balancer (recommended)
#    - Or enable embedded Tomcat SSL
#
# ✅ 7. LOGGING
#    - Configure log aggregation (CloudWatch, ELK, etc.)
#    - Set appropriate log levels
#
# ✅ 8. MONITORING
#    - Set up health checks
#    - Configure alerts for errors
# =============================================================================


# =============================================================================
# DEPLOYMENT PLATFORM NOTES
# =============================================================================
# RAILWAY:
#   - Set environment variables in Railway dashboard
#   - DATABASE_URL is auto-provided for PostgreSQL
#   - Use: heroku-postgresql:hobby-dev or higher
#
# RENDER:
#   - Set environment variables in Render dashboard
#   - Use PostgreSQL service (render.com)
#   - DATABASE_URL is auto-provided
#
# HEROKU:
#   - Set environment variables in Heroku dashboard
#   - Use Heroku PostgreSQL add-on
#   - DATABASE_URL is auto-provided
#
# DOCKER:
#   - Pass environment variables via -e flag
#   - Or use docker-compose with environment section
#   - Example: docker run -e DATABASE_URL=... -e JWT_SECRET=...
# =============================================================================
